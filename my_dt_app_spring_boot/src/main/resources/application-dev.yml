spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dakar_terminal_dev?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: root

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    clean-disabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: dev@dakarterminal.sn
    password: dev-password

# Storage - local in dev
storage:
  type: local
  local:
    path: ./uploads/dev

# JWT
jwt:
  secret: dev-secret-key-dakar-terminal-2024-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

# Logging - more verbose in dev
logging:
  level:
    root: INFO
    sn.dakarterminal: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

server:
  port: 8080

app:
  url: http://localhost:8080
  frontend-url: http://localhost:3000
